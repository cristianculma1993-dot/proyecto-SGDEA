<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de Contraseña - SGDEA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        nav { background-color: #1a237e !important; }
        /* Estilo para el texto del logo que reemplaza a la imagen */
        .brand-logo { font-weight: bold; padding-left: 20px !important; }
        .card-pass { padding: 40px; background: white; border-radius: 12px; margin-top: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 500px; margin-left: auto; margin-right: auto; }
        .btn-update { background-color: #1a237e; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-wrapper" style="padding: 0 20px;">
            <!-- Logo reemplazado por texto para evitar problemas de visualización -->
            <a href="#" class="brand-logo">SGDEA</a>
        </div>
    </nav>

    <div class="container">
        <div class="card-pass">
            <h4 class="center-align" style="color: #1a237e;">Cambio de Contraseña</h4>
            <p class="center-align grey-text">Por seguridad, debes establecer una nueva contraseña para continuar.</p>
            <form id="passForm">
                <div class="input-field">
                    <input type="password" id="p1" required>
                    <label for="p1">Nueva Contraseña</label>
                </div>
                <div class="input-field">
                    <input type="password" id="p2" required>
                    <label for="p2">Confirmar Contraseña</label>
                </div>
                <button type="submit" class="btn btn-large btn-update waves-effect">ACTUALIZAR Y ACCEDER</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.getElementById('passForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let p1 = document.getElementById('p1').value;
            let p2 = document.getElementById('p2').value;

            if(p1 === p2) {
                alert("Contraseña actualizada con éxito");
                window.location.href = "login.html";
            } else {
                alert("¡Error! Las contraseñas no coinciden");
            }
        });
    </script>
</body>
</html>
