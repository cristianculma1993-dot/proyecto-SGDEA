<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planillas - SGDEA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        nav { background-color: #1a237e !important; }
        .brand-logo { font-weight: bold; padding-left: 20px !important; }
        .content-card { padding: 30px; background: white; border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .table-container { overflow-x: auto; margin-bottom: 20px; }
        th { color: #1a237e; font-size: 0.9rem; }
        .actions-btn { margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-wrapper" style="padding: 0 20px;">
            <!-- Logo reemplazado por texto -->
            <a href="#" class="brand-logo">SGDEA</a>
            
            <!-- Botón de navegación a la derecha -->
            <ul id="nav-mobile" class="right">
                <li><a href="login.html" class="btn blue darken-4">Volver al Inicio</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="content-card">
            <h4 class="center-align" style="color: #1a237e; margin-bottom: 30px;">Planilla de Usuarios</h4>
            
            <div class="table-container">
                <table class="striped highlight">
                    <thead>
                        <tr>
                            <th>Nombres</th>
                            <th>Apellidos</th>
                            <th>Documento</th>
                            <th>Correo</th>
                            <th>Cargo</th>
                            <th>Área</th> 
                            <th>EPS</th>
                            <th>ARL</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Ejemplo</td>
                            <td>Ejemplo</td>
                            <td>CC 123456</td>
                            <td>ejemplo@correo.com</td>
                            <td>Cargo</td>
                            <td>Área</td>
                            <td>EPS</td>
                            <td>ARL</td>
                            <td>Admin</td>
                            <td>
                                <a href="#" class="btn-small blue">Editar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="actions-btn center-align">
                <a href="javascript:history.back()" class="btn grey darken-1 waves-effect">Regresar</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
