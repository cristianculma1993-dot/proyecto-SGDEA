<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGDEA - Inicio</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body { background-color: #f4f7f6; display: flex; min-height: 100vh; flex-direction: column; }
        main { flex: 1 0 auto; padding-top: 20px; }
        
        /* Estilos */  
        .nav-wrapper { padding: 0 20px; background-color: #0d47a1; }
        .brand-logo { font-weight: bold; color: white; }
        .login-card { padding: 40px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-login { background-color: #1976d2; transition: all 0.3s ease; border-radius: 25px; width: 100%; margin-top: 10px; }
        .btn-login:hover { background-color: #1565c0; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(25,118,210,0.4); }
        
        /* Footer azul oscuro */
        footer.page-footer { background-color: #0d47a1 !important; color: #ffffff !important; padding: 15px 0; font-size: 0.85rem; }
    </style>
</head>
<body>

    <!-- Menú de Navegación -->
    <nav>
        <div class="nav-wrapper">
            <a href="login.html" class="brand-logo">SGDEA</a>
            <ul id="nav-mobile" class="right hide-on-med-and-down">
                <li><a href="login.html">Inicio</a></li>
                <li><a href="registro.html">Registro (Admin)</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="row">
                <div class="col s12 m6 offset-m3">
                    <div class="login-card">
                        <h4 class="center-align" style="color: #0d47a1;">Iniciar Sesión</h4>
                        <form id="loginForm">
                            <div class="input-field">
                                <input type="text" id="user" required>
                                <label for="user">Usuario (Admin)</label>
                            </div>
                            <div class="input-field">
                                <input type="password" id="pass" required>
                                <label for="pass">Contraseña</label>
                            </div>
                            <div class="input-field">
                                <select id="rol">
                                    <option value="" disabled selected>Seleccione su rol</option>
                                    <option value="1">Administrador</option>
                                    <option value="2">Usuario</option>
                                </select>
                            </div>
                             
                            <button type="submit" class="btn btn-large btn-login">INGRESAR</button>
                            
                            <!-- Opción de recuperación -->
                            <div class="center-align" style="margin-top: 20px;">
                                <a href="cambio_contraseña.html" style="color: #0d47a1; font-size: 0.9rem; text-decoration: underline;">¿Olvidaste tu contraseña?</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="page-footer center-align">
        <p>Empresa Proyectar S.A. | Calle 43 No. 57 - 14, Bogotá D.C. | Tel: +57 (601) 222 2700</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.FormSelect.init(document.querySelectorAll('select'));
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = "cambio_contraseña.html";
        });
    </script>
</body>
</html>
